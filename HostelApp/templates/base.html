<!DOCTYPE html>
<html lang="en">
<head>
    <title>Sardar Patel Hostel</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fa;
        }

        .fancy-brand {
            font-size: 24px;
            font-weight: 600;
            letter-spacing: 3px;
            color: #ffffff !important;
            text-transform: uppercase;
        }

        .fancy-brand:hover {
            color: #ffc107 !important;
            transition: 0.3s;
        }

        main {
            min-height: 70vh;
        }

        .custom-navbar {
            background-color: #2c3e50; /* dark blue-gray */
        }

    </style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark custom-navbar shadow">
    <div class="container">

        <a class="navbar-brand fancy-brand" href ='{% url "home" %}'>
            Sardar Patel Hostel
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
            <div class="d-flex gap-4">

                {% if request.user.is_authenticated %}
                    <a href="{% url 'redirect_dashboard' %}" class="btn btn-outline-light me-2">
                        Home
                    </a>
                    <a href="{% url 'logout' %}" class="btn btn-danger">
                        Logout
                    </a>
                {% else %}
                    <a href="{% url 'login' %}" class="btn btn-outline-warning " style ="width: 150px; text-align: center; padding: 6px 0; ">
                        Login
                    </a>
                
                {% endif %}

            </div>
        </div>

    </div>
</nav>

<!-- Main Content -->
<main class="container mt-4">
    {% block content %}
    {% endblock %}
</main>

<!-- Footer -->
{% comment %} <footer class="bg-dark text-white text-center py-3 mt-5">
    <p class="mb-0">© 2026 Sardar Patel Hostel</p>
</footer> {% endcomment %}

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
