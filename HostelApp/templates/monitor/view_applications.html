{% extends 'base.html' %}
{% block content %}

<h2>Applications ({{ status }})</h2>

<table class="table">
<tr>
    <th>Name</th>
    <th>Hostel</th>
    <th>Status</th>
    <th>Action</th>
</tr>

{% for app in applications %}
<tr>
    <td>{{ app.student.full_name }}</td>
    <td>{{ app.preferred_hostel.name }}</td>
    <td>{{ app.status }}</td>

    <td>
        <button onclick="openModal({{ app.id }})">Show Details</button>
    </td>
</tr>
{% endfor %}
</table>

{% endblock %}
