{% extends 'base.html' %}
{% block content %}

<h3>All Monitors</h3>

<table class="table table-bordered">
    <thead class="table-dark">
        <tr>
            <th>Username</th>
            <th>Action</th>
        </tr>
    </thead>
    <tbody>
        {% for monitor in monitors %}
        <tr>
            <td>{{ monitor.user.username }}</td>
            <td>
                <a href="{% url 'delete_monitor' monitor.id %}" 
                   class="btn btn-danger btn-sm">Delete</a>
            </td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="2">No Monitors</td>
        </tr>
        {% endfor %}
    </tbody>
</table>

{% endblock %}
