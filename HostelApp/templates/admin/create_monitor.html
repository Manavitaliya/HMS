{% extends 'base.html' %}
{% block content %}

<div class="card shadow">
    <div class="card-header bg-dark text-white">
        <h4>Create Monitor</h4>
    </div>
    <div class="card-body">
        <form method="POST">
            {% csrf_token %}
            
            <div class="mb-3">
                <label>Username</label>
                {{ form.username }}
            </div>

            <div class="mb-3">
                <label>Password</label>
                {{ form.password }}
            </div>

            <button class="btn btn-success">Create Monitor</button>
        </form>
    </div>
</div>

{% endblock %}
