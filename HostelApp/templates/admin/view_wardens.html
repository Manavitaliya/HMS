{% extends 'base.html' %}
{% block content %}

<h3>All Wardens</h3>

<table class="table table-bordered">
    <thead class="table-dark">
        <tr>
            <th>Username</th>
            <th>Hostel</th>
            <th>Action</th>
        </tr>
    </thead>
    <tbody>
        {% for warden in wardens %}
        <tr>
            <td>{{ warden.user.username }}</td>
            <td>{{ warden.hostel.name }}</td>
            <td>
                <a href="{% url 'delete_warden' warden.id %}" 
                   class="btn btn-danger btn-sm">Delete</a>
            </td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="3">No Wardens</td>
        </tr>
        {% endfor %}
    </tbody>
</table>

{% endblock %}
