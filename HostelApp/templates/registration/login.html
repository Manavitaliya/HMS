{% extends 'base.html' %}

{% block content %}

<style>
.login-container {
    height: 80vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background-color: #fff8e1;
}

.login-box {
    width: 360px;
    padding: 28px;
    background: #ffffff;
    border-radius: 10px;
    border-top: 5px solid #f39c12;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

.login-box h2 {
    text-align: center;
    margin-bottom: 5px;
}

.subtitle {
    text-align: center;
    font-size: 14px;
    color: gray;
    margin-bottom: 20px;
}

.form-row {
    margin-bottom: 15px;
}

.form-row input {
    width: 100%;
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 6px;
    outline: none;
}

.form-row input:focus {
    border-color: #2c3e50;
}

.btn-login {
    width: 100%;
    padding: 10px;
    background: #f39c12;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

.btn-login:hover {
    background: #d68910;
}

.register-link {
    text-align: center;
    margin-top: 15px;
    font-size: 14px;
}
</style>

<div class="login-container">
    <div class="login-box">

        <h2>Login</h2>
        <p class="subtitle">Sardar Patel Hostel</p>

        <form method="POST">
            {% csrf_token %}

            <div class="form-row">
                <input type="text" name="username" placeholder="Username" required>
            </div>

            <div class="form-row">
                <input type="password" name="password" placeholder="Password" required>
            </div>

            <button type="submit" class="btn-login">Login</button>
        </form>

        <p class="register-link">
            Don't have an account?
            <a href="{% url 'student_register' %}">Register</a>
        </p>

    </div>
</div>

{% endblock %}
